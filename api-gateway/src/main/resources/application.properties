spring.application.name=api-gateway

server.port=8765

logging.level.org.springframework.cloud.gateway=DEBUG

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=address-service
springdoc.swagger-ui.urls[0].url=/address-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=auth-service
springdoc.swagger-ui.urls[1].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=bank-account-service
springdoc.swagger-ui.urls[2].url=/bank-account-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=crop-service
springdoc.swagger-ui.urls[3].url=/crop-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=dealer-service
springdoc.swagger-ui.urls[4].url=/dealer-service/v3/api-docs
springdoc.swagger-ui.urls[5].name=farmer-service
springdoc.swagger-ui.urls[5].url=/farmer-service/v3/api-docs
springdoc.swagger-ui.urls[6].name=payment-receipt-service
springdoc.swagger-ui.urls[6].url=/payment-receipt-service/v3/api-docs
springdoc.swagger-ui.urls[7].name=review-service
springdoc.swagger-ui.urls[7].url=/review-service/v3/api-docs

